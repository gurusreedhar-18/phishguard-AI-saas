<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detection SaaS</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding-top: 80px;
        }
        input {
            width: 420px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>🔐 Phishing URL Detection (AI SaaS)</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>
        <br><br>
        <button type="submit">Check URL</button>
    </form>

    {% if result %}
        <div class="result">
            <p><b>URL:</b> {{ url }}</p>
            <p><b>Result:</b> {{ result }}</p>
        </div>
    {% endif %}

</body>
</html>
