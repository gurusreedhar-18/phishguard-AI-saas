<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - PhishGuard AI</title>
</head>
<body>

    <h2>Welcome {{ username }}</h2>

    <h3>Your API Key:</h3>
    <p>{{ api_key }}</p>

    <h3>Usage</h3>
    <p>Requests Used: {{ used }}</p>
    <p>Remaining: {{ remaining }}</p>

    <hr>

    <h3>Test URL</h3>

    <form method="POST" action="/test-url">

        <!-- ✅ IMPORTANT FIX -->
        <input type="hidden" name="user_id" value="{{ user_id }}">

        <input type="text" name="url" placeholder="Enter URL" required>
        <button type="submit">Check</button>

    </form>

    {% if result %}
        <h3>Result:</h3>
        <p>{{ result }}</p>
    {% endif %}

</body>
</html>
